<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Three interconnected figure nodes forming a collaborative network -->
  <!-- Top node -->
  <circle cx="24" cy="10" r="4" fill="currentColor"/>
  <!-- Bottom-left node -->
  <circle cx="12" cy="34" r="4" fill="currentColor"/>
  <!-- Bottom-right node -->
  <circle cx="36" cy="34" r="4" fill="currentColor"/>
  <!-- Connection lines forming triangle network -->
  <line x1="24" y1="14" x2="14" y2="30" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="14" x2="34" y2="30" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="34" x2="32" y2="34" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <!-- Center connection dot - the shared work -->
  <circle cx="24" cy="26" r="2.5" fill="currentColor" opacity="0.6"/>
</svg>
