name: publish-to-s3
on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  sync-s3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          role-to-assume: arn:aws:iam::372718550721:role/lancement-deploy
          aws-region: us-east-1

      - name: Sync to S3
        run: aws s3 sync . s3://lancement.com --delete --exclude '.git/*' --exclude '.github/*' --exclude '.claude/*'

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id E19KLRSFLI0BBM --paths '/*'
